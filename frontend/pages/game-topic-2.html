<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/game-topic-2.css">
    <script defer src="../js/game-topic-2.js"></script>
    <title>Ancient Egypt Adventure</title>
</head>

<body>
    <!-- User menu -->
    <div id="user-menu">
        <button id="user-btn">👤</button>
        <div id="user-dropdown">
            <a href="../pages/home-page.html"> Home</a>
            <a href="../pages/index.html"> Logout</a>
        </div>
    </div>

    <!-- Page heading -->
    <section>
        <div class="sect-heading">
            <h1 class="gametitle">Ancient Egypt Adventure</h1>
        </div>
    </section>

    <!-- Main game content -->
    <section id="main-sect" class="main-sect">
        <div id="content" class="content">
            <p id="question">
                You are an explorer in Ancient Egypt. Answer correctly to uncover the secrets of the Nile and survive
                your journey.
            </p>
            <div id="answer-options"></div>
        </div>

        <button id="nextQBtn" class="enterq">
            Start
        </button>
    </section>
    <!-- Audio tags for win or lose effects-->
    <audio id="victory-trumpet" src="../assets/victory-trumpet.mp3"></audio>
    <audio id="lose-trumpet" src="../assets/lose-trumpet.mp3"></audio>
    <!-- Script and tag to load the confetti effect-->
    <canvas id="confetti"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/js-confetti@latest/dist/js-confetti.browser.js"></script>
</body>

</html>
